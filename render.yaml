services:
  - type: web
    name: bill-ease
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    disk:
      name: bill-ease-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
